aid: sleekflow
url: https://raw.githubusercontent.com/api-evangelist/sleekflow/refs/heads/main/apis.yml
name: SleekFlow
kind: company
description: SleekFlow is an omnichannel social-commerce and customer-engagement
  platform that unifies WhatsApp, Facebook Messenger, Instagram, WeChat, LINE, SMS,
  and live chat into a single inbox with automation, broadcast, and AI. The SleekFlow
  Platform API exposes contacts, conversations, messaging, companies, lists, staff
  and teams, and webhooks for building custom integrations on top of the platform.
